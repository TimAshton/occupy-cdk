---
openapi: 3.0.2
info:
    title: Occupy
    version: '1.0'
    description: 'defines an API for the game, Occupy.'
x-amazon-apigateway-request-validators:
    all:
        validateRequestBody: true
        validateRequestParameters: true
    params-only:
        validateRequestBody: false
        validateRequestParameters: true
x-amazon-apigateway-request-validator: params-only
paths:
    '/game/create':
        # 1. The POST method for your actual logic
        post:
            x-amazon-apigateway-auth:
                type: AWS_IAM
            x-amazon-apigateway-request-validator: all
            x-amazon-apigateway-integration:
                httpMethod: POST # Lambda always receives a POST
                uri: GameHandler
                type: aws_proxy
            responses:
                '200':
                    description: Successful operation
        # 2. REQUIRED: The OPTIONS method for CORS (No Auth)
        options:
            summary: CORS preflight
            x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                    application/json: '{"statusCode": 200}'
                responses:
                    default:
                        statusCode: '200'
                        responseParameters:
                            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
                            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
                            method.response.header.Access-Control-Allow-Origin: "'*'"
            responses:
                '200':
                    description: OK
                    headers:
                        Access-Control-Allow-Headers:
                            type: string
                        Access-Control-Allow-Methods:
                            type: string
                        Access-Control-Allow-Origin:
                            type: string

    '/game/{gameId}':
        get:
            x-amazon-apigateway-auth:
                type: AWS_IAM
            x-amazon-apigateway-integration:
                httpMethod: POST # Internal trigger to Lambda is POST
                uri: GameHandler
                type: aws_proxy
            parameters:
                - name: gameId
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: successful operation
        # Add OPTIONS here as well if you plan to fetch this from a browser

components:
    schemas:
        GameAttributes:
            type: object
            required:
                - player_count
            properties:
                player_count:
                    type: integer
                    minimum: 1
                    maximum: 2

        GameObject:
            allOf:
                - $ref: '#/components/schemas/GameAttributes'
                - type: object
                  required:
                      - id
                      - created_date
                  properties:
                      id:
                          type: integer
                          format: int64
                      created_date:
                          type: string
                          format: date-time
                          example: '2026-05-20T14:30:00.000Z'
                      invite_code:
                          type: string
